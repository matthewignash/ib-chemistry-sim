<script>
// ═══════════════════════════════════════════════════════
// CLIENT-SIDE LOGIC — Single page with tabs
// ═══════════════════════════════════════════════════════

var studentName = '';
var activeTab = 'tutorial';

// ─── NAME GATE ───

function initNameGate() {
  var gate = document.getElementById('nameGate');
  var input = document.getElementById('nameInput');
  var btn = document.getElementById('nameBtn');

  if (window._studentName) {
    studentName = window._studentName;
    gate.classList.add('hidden');
    return;
  }

  input.addEventListener('input', function() {
    btn.disabled = this.value.trim().length < 2;
  });

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && this.value.trim().length >= 2) {
      submitName();
    }
  });
}

function submitName() {
  var input = document.getElementById('nameInput');
  var name = input.value.trim();
  if (name.length < 2) return;

  studentName = name;
  window._studentName = name;
  document.getElementById('nameGate').classList.add('hidden');

  var nameEl = document.getElementById('studentNameDisplay');
  if (nameEl) nameEl.textContent = name;
}

// ─── TAB SWITCHING ───

var diagramsInitialized = false;

function switchTab(tabName) {
  activeTab = tabName;

  // Update tab buttons
  var buttons = document.querySelectorAll('.tab-btn');
  buttons.forEach(function(btn) {
    if (btn.dataset.tab === tabName) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });

  // Update panels
  var panels = document.querySelectorAll('.tab-panel');
  panels.forEach(function(panel) {
    if (panel.id === 'panel-' + tabName) {
      panel.classList.add('active');
    } else {
      panel.classList.remove('active');
    }
  });

  // Lazy-init diagram canvases (can't render while display:none)
  if (tabName === 'diagrams' && !diagramsInitialized && typeof initCanvas === 'function') {
    diagramsInitialized = true;
    // Short delay to ensure the panel is visible before canvas init
    setTimeout(function() {
      initCanvas('d1');
      initCanvas('d2');
      initCanvas('d3');
    }, 50);
  }
}

// ─── MC OPTION CLICK ───

function selectOption(li) {
  var card = li.closest('.question-card');
  var solution = card.querySelector('.solution');

  if (solution && solution.classList.contains('visible')) return;

  // Check if already locked (practice MC after submit)
  if (li.classList.contains('locked')) return;

  var siblings = li.parentElement.querySelectorAll('li');
  siblings.forEach(function(s) { s.classList.remove('selected'); });
  li.classList.add('selected');
}

// ─── REVEAL (Tutorial) ───

function revealSolution(qId, correctAnswer) {
  var card = document.getElementById('q-' + qId);
  if (!card) return;

  var solution = card.querySelector('.solution');
  var btn = card.querySelector('.reveal-btn');
  var options = card.querySelectorAll('.options li');
  var selected = card.querySelector('.options li.selected');

  solution.classList.add('visible');
  if (btn) btn.style.display = 'none';

  options.forEach(function(li) {
    li.classList.add('locked');
    if (li.dataset.val === correctAnswer) {
      li.classList.add('correct');
    }
  });

  if (selected && selected.dataset.val !== correctAnswer) {
    selected.classList.add('incorrect');
  }

  var studentAnswer = selected ? selected.dataset.val : 'none';
  var isCorrect = studentAnswer === correctAnswer;
  logStudentResponse(qId, card.dataset.num, studentAnswer, correctAnswer, isCorrect, 'tutorial');
}

// ─── SUBMIT MC (Practice) ───

function submitMC(qId, correctAnswer) {
  var card = document.getElementById('q-' + qId);
  if (!card) return;

  var options = card.querySelectorAll('.options li');
  var selected = card.querySelector('.options li.selected');
  var answerKey = card.querySelector('.answer-key');

  if (!selected) {
    options.forEach(function(li) {
      li.style.borderColor = '#F59E0B';
      setTimeout(function() { li.style.borderColor = ''; }, 600);
    });
    return;
  }

  options.forEach(function(li) { li.classList.add('locked'); });

  if (selected.dataset.val === correctAnswer) {
    selected.classList.add('correct');
  } else {
    selected.classList.add('incorrect');
    options.forEach(function(li) {
      if (li.dataset.val === correctAnswer) li.classList.add('correct');
    });
  }

  if (answerKey) answerKey.classList.add('visible');

  var btn = card.querySelector('.submit-btn');
  if (btn) btn.style.display = 'none';

  var studentAnswer = selected.dataset.val;
  var isCorrect = studentAnswer === correctAnswer;
  logStudentResponse(qId, card.dataset.num, studentAnswer, correctAnswer, isCorrect, 'practice');

  updateScore();
}

// ─── TOGGLE ANSWERS (Practice SA) ───

function toggleSAAnswer(qId) {
  var card = document.getElementById('q-' + qId);
  if (!card) return;
  var answerKey = card.querySelector('.answer-key');
  var btn = card.querySelector('.reveal-btn');

  if (answerKey.classList.contains('visible')) {
    answerKey.classList.remove('visible');
    btn.textContent = 'Show Answer';
  } else {
    answerKey.classList.add('visible');
    btn.textContent = 'Hide Answer';
    logStudentResponse(qId, card.dataset.num, 'viewed_answer', 'SA', false, 'practice');
  }
}

// ─── TOGGLE ALL ANSWERS ───

var allAnswersVisible = false;

function toggleAllAnswers() {
  allAnswersVisible = !allAnswersVisible;
  var panel = document.getElementById('panel-practice');
  var keys = panel.querySelectorAll('.answer-key');
  var btn = document.getElementById('toggleAllBtn');

  keys.forEach(function(k) {
    if (allAnswersVisible) {
      k.classList.add('visible');
    } else {
      k.classList.remove('visible');
    }
  });

  btn.textContent = allAnswersVisible ? 'Hide All Answers' : 'Show All Answers';
  btn.classList.toggle('active', allAnswersVisible);
}

// ─── SCORE TRACKING (Practice) ───

function updateScore() {
  var scoreBanner = document.getElementById('scoreBanner');
  if (!scoreBanner) return;

  var panel = document.getElementById('panel-practice');
  var mcCards = panel.querySelectorAll('.question-card[data-format="MC"]');
  var answered = 0;
  var correct = 0;
  var total = mcCards.length;

  mcCards.forEach(function(card) {
    var hasCorrect = card.querySelector('.options li.correct');
    var hasIncorrect = card.querySelector('.options li.incorrect');
    if (hasCorrect || hasIncorrect) {
      answered++;
      if (hasCorrect && !hasIncorrect) correct++;
    }
  });

  if (answered > 0) {
    scoreBanner.classList.add('visible');
    document.getElementById('scoreNum').textContent = correct + ' / ' + answered;
    document.getElementById('scoreLabel').textContent =
      answered < total
        ? 'MC Questions Answered (' + (total - answered) + ' remaining)'
        : 'MC Questions Complete';
  }
}

// ─── RESPONSE LOGGING ───

function logStudentResponse(qId, qNum, answer, correct, isCorrect, page) {
  if (!studentName) return;

  google.script.run
    .withFailureHandler(function(err) {
      console.warn('Failed to log response:', err);
    })
    .logResponse({
      studentName: studentName,
      page: page || activeTab,
      questionId: qId,
      questionNum: qNum,
      answer: answer,
      correctAnswer: correct,
      isCorrect: isCorrect
    });
}

// ─── DATA LOADING & UI BUILDING ───

function loadAllData() {
  google.script.run
    .withSuccessHandler(function(data) {
      applyConfig(data.config);
      buildTutorial(data.tutorial);
      buildPractice(data.practice);
    })
    .withFailureHandler(function(err) {
      document.getElementById('tutorialLoading').innerHTML =
        '<p style="color:#DC2626;">Error loading: ' + err.message + '</p>';
      document.getElementById('practiceLoading').innerHTML =
        '<p style="color:#DC2626;">Error loading: ' + err.message + '</p>';
    })
    .getAllData();
}

function applyConfig(config) {
  document.getElementById('headerTitle').textContent =
    (config.topicCode || '') + ': ' + (config.topicName || '');
  document.getElementById('headerSubtitle').textContent =
    (config.topicTag || 'IB Chemistry');
  document.getElementById('headerTag').textContent = config.topicTag || 'IB Chemistry';
  document.getElementById('headerCode').textContent = config.topicCode || '';
  document.getElementById('pageFooter').textContent =
    'IB Chemistry — ' + (config.topicCode || '');
}

// ─── BUILD TUTORIAL ───

function buildTutorial(questions) {
  var container = document.getElementById('tutorialQuestions');
  container.innerHTML = '';
  var letters = ['A', 'B', 'C', 'D'];

  questions.forEach(function(q) {
    var card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q-' + q.id;
    card.dataset.num = q.number;

    var header = '<div class="q-header">' +
      '<div class="q-number">' + q.number + '</div>' +
      '<div class="q-title">' + esc(q.topic) + '</div>' +
      (q.source ? '<div class="q-source">' + esc(q.source) + '</div>' : '') +
      '</div>';

    var optionsHtml = '<ul class="options">';
    q.options.forEach(function(opt, i) {
      optionsHtml += '<li data-val="' + letters[i] + '" onclick="selectOption(this)">' +
        '<span class="opt-letter">' + letters[i] + '</span> ' + esc(opt) + '</li>';
    });
    optionsHtml += '</ul>';

    var btnHtml = '<button class="reveal-btn" onclick="revealSolution(\'' +
      q.id + '\', \'' + q.correctAnswer + '\')">Show Solution</button>';

    var solHtml = '<div class="solution">';
    var correctIdx = letters.indexOf(q.correctAnswer);
    var correctText = correctIdx >= 0 && q.options[correctIdx] ? q.options[correctIdx] : '';
    solHtml += '<div class="answer-banner correct-banner">Correct Answer: ' +
      q.correctAnswer + ' — ' + esc(correctText) + '</div>';

    if (q.steps && q.steps.length > 0) {
      solHtml += '<div class="walkthrough"><h4>Step-by-step reasoning</h4>';
      q.steps.forEach(function(step) {
        solHtml += '<div class="step">' +
          '<div class="step-num">Step ' + step.num + ' — ' + esc(step.title) + '</div>' +
          '<p>' + step.text + '</p></div>';
      });
      solHtml += '</div>';
    }

    var hasDistractors = false;
    var distHtml = '<div class="distractor-box"><h4>Why the other options are wrong</h4><ul>';
    letters.forEach(function(letter, i) {
      if (letter === q.correctAnswer) return;
      var dText = q.distractors[letter];
      if (dText) {
        hasDistractors = true;
        distHtml += '<li><strong>' + letter + ' — ' + esc(q.options[i]) + ':</strong> ' +
          esc(dText) + '</li>';
      }
    });
    distHtml += '</ul></div>';
    if (hasDistractors) solHtml += distHtml;

    if (q.keyTakeaway) {
      solHtml += '<div class="key-point"><strong>Key IB takeaway:</strong> ' +
        esc(q.keyTakeaway) + '</div>';
    }
    solHtml += '</div>';

    card.innerHTML = header +
      '<div class="q-body">' +
        '<div class="q-stem">' + esc(q.stem) + '</div>' +
        optionsHtml + btnHtml + solHtml +
      '</div>';

    container.appendChild(card);
  });

  document.getElementById('tutorialLoading').style.display = 'none';
  container.style.display = 'block';
}

// ─── BUILD PRACTICE ───

function buildPractice(questions) {
  var container = document.getElementById('practiceQuestions');
  container.innerHTML = '';
  var letters = ['A', 'B', 'C', 'D'];

  questions.forEach(function(q) {
    var card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q-' + q.id;
    card.dataset.num = q.number;
    card.dataset.format = q.format;

    var typeBadge = q.format === 'MC'
      ? '<span class="p-type p-type-mc">Multiple Choice</span>'
      : '<span class="p-type p-type-sa">Short Answer</span>';

    var header = '<div class="q-header">' +
      '<div class="q-number">' + q.number + '</div>' +
      '<div class="q-title">' + esc(q.topic) + '</div>' +
      typeBadge +
      '<span class="p-marks">[' + q.marks + ' mark' + (q.marks > 1 ? 's' : '') + ']</span>' +
      '</div>';

    var body = '<div class="q-body">';
    body += '<div class="q-stem">' + esc(q.stem) + '</div>';

    if (q.format === 'MC') {
      body += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        body += '<li data-val="' + letters[i] + '" onclick="selectOption(this)">' +
          '<span class="opt-letter">' + letters[i] + '</span> ' + esc(opt) + '</li>';
      });
      body += '</ul>';
      body += '<button class="submit-btn" onclick="submitMC(\'' +
        q.id + '\', \'' + q.correctAnswer + '\')">Check Answer</button>';

      body += '<div class="answer-key"><h4>Answer: ' + q.correctAnswer + '</h4>';
      var hasExpl = false;
      var explHtml = '<ul>';
      letters.forEach(function(letter, i) {
        var text = '';
        if (letter === q.correctAnswer && q.options[i]) {
          text = '<strong>' + letter + ' (correct):</strong> This is the right answer.';
          hasExpl = true;
        } else if (q.distractors[letter]) {
          text = '<strong>' + letter + ':</strong> ' + esc(q.distractors[letter]);
          hasExpl = true;
        }
        if (text) explHtml += '<li>' + text + '</li>';
      });
      explHtml += '</ul>';
      if (hasExpl) body += explHtml;
      body += '</div>';

    } else {
      body += '<div class="sa-parts">';
      q.saParts.forEach(function(part) {
        body += '<div class="sa-part">' +
          '<div class="sa-part-label">(' + part.label + ') ' + esc(part.prompt) +
          ' [' + part.marks + ']</div>' +
          '<div class="answer-space">Write your answer here...</div></div>';
      });
      body += '</div>';
      body += '<button class="reveal-btn" onclick="toggleSAAnswer(\'' + q.id + '\')">Show Answer</button>';
      body += '<div class="answer-key"><h4>Marking Scheme</h4>';
      q.saParts.forEach(function(part) {
        body += '<p><strong>(' + part.label + ')</strong> ' + part.answer + '</p>';
      });
      body += '</div>';
    }

    body += '</div>';
    card.innerHTML = header + body;
    container.appendChild(card);
  });

  document.getElementById('practiceLoading').style.display = 'none';
  container.style.display = 'block';
}

function esc(str) {
  if (!str) return '';
  return String(str);
}
</script>
