  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
  :root{--navy:#1E293B;--teal:#0D9488;--blue:#2563EB;--purple:#7C3AED;--red:#DC2626;--amber:#D97706;--text:#1E293B;--text-muted:#94A3B8;--border:#E2E8F0;--card-bg:#FFFFFF;--sim-canvas-bg:#F8FAFC;--blue-bg:#EFF6FF;--teal-bg:#F0FDFA;--amber-bg:#FFFBEB;--red-bg:#FEF2F2;--purple-bg:#F5F3FF;--toggle-on:#0D9488;--orange:#EA580C;--green:#16A34A;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',system-ui,sans-serif;background:#F1F5F9;color:var(--text);line-height:1.6;}
  .header{background:var(--navy);color:white;padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
  .header h1{font-size:1.1rem;font-weight:700;} .header .subtitle{font-size:.78rem;opacity:.7;margin-left:.5rem;}
  .header-home{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;color:rgba(255,255,255,.6);background:rgba(255,255,255,.08);text-decoration:none;transition:.2s;flex-shrink:0;}
  .header-home:hover{color:#fff;background:rgba(255,255,255,.15);}
  .header-right{display:flex;align-items:center;gap:.75rem;}
  .header-badge{padding:.15rem .5rem;border-radius:4px;font-size:.7rem;font-weight:600;background:rgba(255,255,255,.15);}
  .header-badge.hl{background:var(--purple);display:none;} body.hl-active .header-badge.hl{display:inline-block;}
  .sim-toggle-group{display:flex;align-items:center;gap:.35rem;}
  .sim-toggle{position:relative;width:40px;height:22px;display:inline-block;}
  .sim-toggle input{opacity:0;width:0;height:0;}
  .sim-toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#CBD5E1;border-radius:11px;transition:.3s;}
  .sim-toggle input:checked+.sim-toggle-slider{background:var(--toggle-on);}
  .sim-toggle-slider::before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
  .sim-toggle input:checked+.sim-toggle-slider::before{transform:translateX(18px);}

  .data-table th{background:var(--navy);color:white;padding:.4rem .6rem;position:sticky;top:0;text-align:left;font-size:.72rem;}
  .data-table td{padding:.3rem .6rem;border-bottom:1px solid var(--border);}
  .data-table tr:nth-child(even){background:#F8FAFC;}
  .data-table tr.highlight{background:var(--teal-bg);}
  .collect-controls{display:flex;gap:.75rem;align-items:center;margin-bottom:1rem;padding:.75rem;background:var(--card-bg);border-radius:8px;border:1px solid var(--border);}
  .collect-btn{padding:.5rem 1.25rem;border:none;border-radius:6px;font-family:inherit;font-weight:600;font-size:.82rem;cursor:pointer;transition:.2s;}
  .collect-btn.start{background:var(--teal);color:white;}
  .collect-btn.start:hover{background:#0F766E;}
  .collect-btn.stop{background:var(--red);color:white;}
  .collect-btn.reset{background:var(--border);color:var(--text);}
  .speed-toggle{font-size:.72rem;padding:.25rem .5rem;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:white;}
  .speed-toggle.active{background:var(--teal);color:white;border-color:var(--teal);}
  .analysis-toolbar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap;}
  .tool-btn{padding:.4rem .8rem;border:1px solid var(--border);border-radius:6px;background:white;font-size:.75rem;font-weight:500;cursor:pointer;font-family:inherit;transition:.2s;}
  .tool-btn:hover{border-color:var(--teal);color:var(--teal);}
  .tool-btn.active{background:var(--teal);color:white;border-color:var(--teal);}
  .results-panel{background:var(--blue-bg);border:1px solid #BFDBFE;border-radius:8px;padding:1rem;margin-top:1rem;font-size:.85rem;}
  .results-panel h4{font-size:.8rem;margin-bottom:.5rem;color:var(--navy);}
  .result-row{display:flex;justify-content:space-between;padding:.25rem 0;border-bottom:1px solid rgba(0,0,0,.05);}
  .result-label{color:var(--text-muted);font-size:.78rem;}
  .result-value{font-family:'Fira Code',monospace;font-weight:600;font-size:.82rem;}
  @media(max-width:700px){.lab-layout{flex-direction:column;}.lab-controls{flex:none;width:100%;}.tab-btn{padding:.6rem .7rem;font-size:.75rem;}}

<script>
(function(){
'use strict';
function clearChildren(el){ while(el.firstChild) el.removeChild(el.firstChild); }

// ── Feedback helper ──
function showFeedback(msg, type){
  var existing = document.querySelector('.feedback');
  if(existing) existing.parentNode.removeChild(existing);
  var div = document.createElement('div');
  div.className = 'feedback ' + (type || 'info');
  div.setAttribute('aria-live','polite');
  div.textContent = msg;
  document.querySelector('.sim-container').appendChild(div);
  setTimeout(function(){ if(div.parentNode) div.parentNode.removeChild(div); }, 3000);
}

// ── Sensor Database ──
var SENSORS = {
  temperature: {
    id: 'temperature', name: 'Go Direct Temperature Probe',
    range: '-40 to 135 °C', precision: '±0.5 °C (probe) / ±0.01 °C (resolution)',
    uncertainty: '±0.5', unit: '°C', sampleRates: [1, 2, 5, 10],
    ibNotes: 'IB uncertainty: ±0.5 °C for the probe. Record to 1 d.p. Resolution is 0.01 °C but accuracy is ±0.5 °C.',
    calibration: 'Two-point calibration: ice water (0.0 °C) and warm water (checked with lab thermometer).',
    commonErrors: ['Not waiting for thermal equilibrium','Reading before stabilisation','Not stirring solution']
  },
  ph: {
    id: 'ph', name: 'Go Direct pH Sensor',
    range: '0–14', precision: '±0.1 (after calibration)',
    uncertainty: '±0.01', unit: '', sampleRates: [1, 2],
    ibNotes: 'IB uncertainty: ±0.01 pH (resolution). Calibrate with pH 4 and pH 7 buffer solutions before each use.',
    calibration: 'Two-point calibration: pH 4.00 buffer and pH 7.00 buffer. Rinse probe with distilled water between buffers.',
    commonErrors: ['Not calibrating before use','Letting probe dry out','Not rinsing between solutions']
  }
};

// ── pH Calculation Helpers ──
function generateWeakAcidPH(v, cAcid, vAcid, cBase, Ka){
  var molesAcid = cAcid * vAcid / 1000;
  var molesBase = cBase * v / 1000;
  var totalVol = (vAcid + v) / 1000;
  var pKa = -Math.log10(Ka);
  var pH;
  if(v < 0.001){
    // Initial pH: Ka = x^2/(Ca-x), approximate
    var Ca = cAcid;
    var x = Math.sqrt(Ka * Ca);
    pH = -Math.log10(x);
  } else if(molesBase < molesAcid * 0.999){
    // Buffer region: Henderson-Hasselbalch
    var concHA = (molesAcid - molesBase) / totalVol;
    var concA = molesBase / totalVol;
    pH = pKa + Math.log10(concA / concHA);
  } else if(molesBase <= molesAcid * 1.001){
    // Equivalence: hydrolysis of conjugate base
    var Cb = molesAcid / totalVol;
    var Kb = 1e-14 / Ka;
    var OH = Math.sqrt(Kb * Cb);
    pH = 14 + Math.log10(OH);
  } else {
    // Excess NaOH
    var excessOH = (molesBase - molesAcid) / totalVol;
    pH = 14 + Math.log10(excessOH);
  }
  return Math.max(0, Math.min(14, pH));
}

function generateDiproticPH(v, cAcid, vAcid, cBase, Ka1, Ka2){
  var molesAcid = cAcid * vAcid / 1000;
  var molesBase = cBase * v / 1000;
  var totalVol = (vAcid + v) / 1000;
  var eq1 = molesAcid;
  var eq2 = 2 * molesAcid;
  var pH;
  if(v < 0.001){
    // Initial: first dissociation
    if(Ka1 > 1){
      // Strong first acid (H2SO4)
      var H = cAcid;
      pH = -Math.log10(H);
    } else {
      var x = Math.sqrt(Ka1 * cAcid);
      pH = -Math.log10(x);
    }
  } else if(molesBase < eq1 * 0.999){
    // First buffer region: H2A / HA-
    if(Ka1 > 1){
      // H2SO4: first proton fully dissociated, remaining H+ from excess + HSO4- equilibrium
      var excessH = (molesAcid - molesBase) / totalVol;
      // Also consider Ka2 contribution from HSO4-
      var concHSO4 = molesBase / totalVol; // HSO4- formed
      // Quadratic: Ka2 = x(excessH + x) / (concHSO4 - x), approximate
      pH = -Math.log10(excessH + Ka2 * concHSO4 / (excessH + Ka2));
    } else {
      var concHA = (molesAcid - molesBase) / totalVol;
      var concA = molesBase / totalVol;
      var pKa1 = -Math.log10(Ka1);
      pH = pKa1 + Math.log10(concA / concHA);
    }
  } else if(molesBase <= eq1 * 1.001){
    // First equivalence: amphoteric HA-
    var pKa1 = -Math.log10(Ka1);
    var pKa2 = -Math.log10(Ka2);
    pH = 0.5 * (pKa1 + pKa2);
    if(Ka1 > 1) pH = 0.5 * ((-Math.log10(Ka2)) + 0); // approximate for strong first acid
  } else if(molesBase < eq2 * 0.999){
    // Second buffer region: HA- / A2-
    var molesHA = eq1 - (molesBase - eq1);  // = 2*molesAcid - molesBase
    var molesA2 = molesBase - eq1;
    var pKa2 = -Math.log10(Ka2);
    pH = pKa2 + Math.log10(molesA2 / molesHA);
  } else if(molesBase <= eq2 * 1.001){
    // Second equivalence: hydrolysis of A2-
    var concA2 = molesAcid / totalVol;
    var Kb = 1e-14 / Ka2;
    var OH = Math.sqrt(Kb * concA2);
    pH = 14 + Math.log10(OH);
  } else {
    // Excess NaOH
    var excessOH = (molesBase - eq2) / totalVol;
    pH = 14 + Math.log10(excessOH);
  }
  return Math.max(0, Math.min(14, pH));
}

// ── Experiment Definitions ──
var EXPERIMENTS = {
  neutralization: {
    id: 'neutralization',
    name: 'Enthalpy of Neutralization',
    sensor: 'temperature',
    description: 'Measure the temperature change when 25.0 cm\u00B3 of 1.00 mol dm\u207B\u00B3 HCl reacts with 25.0 cm\u00B3 of 1.00 mol dm\u207B\u00B3 NaOH in a polystyrene cup calorimeter.',
    xAxis: { label: 'Time', unit: 's' },
    yAxis: { label: 'Temperature', unit: '\u00B0C' },
    defaults: { duration: 180, sampleRate: 2 },
    ibContext: {
      equation: 'HCl(aq) + NaOH(aq) \u2192 NaCl(aq) + H\u2082O(l)',
      expectedDeltaH: -57.1,
      expectedDeltaT: 6.8,
      formula: 'q = mc\u0394T, then \u0394H = \u2212q/n'
    },
    generate: function(settings){
      var data = [];
      var dt = 1 / settings.sampleRate;
      var n = Math.round(settings.duration * settings.sampleRate);
      var T0 = 22.0 + (Math.random() - 0.5) * 2;
      var dT = 6.5 + Math.random() * 1.0;
      var mixTime = 30;
      var mixIdx = Math.round(mixTime * settings.sampleRate);
      for(var i = 0; i < n; i++){
        var t = i * dt;
        var T;
        if(i < mixIdx){
          T = T0 + (Math.random() - 0.5) * 0.3;
        } else {
          var elapsed = t - mixTime;
          T = T0 + dT * (1 - Math.exp(-elapsed / 8)) - elapsed * 0.008;
          T += (Math.random() - 0.5) * 0.3;
        }
        data.push({ x: Math.round(t * 10) / 10, y: Math.round(T * 100) / 100 });
      }
      return data;
    }
  },
  titration: {
    id: 'titration',
    name: 'Strong Acid-Base Titration',
    sensor: 'ph',
    description: 'Monitor pH as 0.100 mol dm\u207B\u00B3 NaOH is added dropwise from a burette to 25.0 cm\u00B3 of 0.100 mol dm\u207B\u00B3 HCl.',
    xAxis: { label: 'Volume NaOH added', unit: 'cm\u00B3' },
    yAxis: { label: 'pH', unit: '' },
    defaults: { volumeIncrement: 1.0, totalVolume: 50.0 },
    ibContext: {
      equation: 'HCl(aq) + NaOH(aq) \u2192 NaCl(aq) + H\u2082O(l)',
      expectedEquivVol: 25.0,
      expectedEquivPH: 7.0,
      formula: 'c(HCl) \u00D7 V(HCl) = c(NaOH) \u00D7 V(NaOH)'
    },
    generate: function(settings){
      var data = [];
      var cAcid = 0.100, vAcid = 25.0, cBase = 0.100;
      var v = 0;
      while(v <= settings.totalVolume + 0.01){
        var molesAcid = cAcid * vAcid / 1000;
        var molesBase = cBase * v / 1000;
        var totalVol = (vAcid + v) / 1000;
        var pH;
        if(molesBase < molesAcid * 0.999){
          var excessH = (molesAcid - molesBase) / totalVol;
          pH = -Math.log10(excessH);
        } else if(molesBase > molesAcid * 1.001){
          var excessOH = (molesBase - molesAcid) / totalVol;
          var pOH = -Math.log10(excessOH);
          pH = 14 - pOH;
        } else {
          pH = 7.0;
        }
        pH = Math.max(0, Math.min(14, pH + (Math.random() - 0.5) * 0.08));
        data.push({ x: Math.round(v * 100) / 100, y: Math.round(pH * 100) / 100 });
        v += settings.volumeIncrement;
      }
      return data;
    }
  },
  combustion: {
    id: 'combustion',
    name: 'Enthalpy of Combustion',
    sensor: 'temperature',
    description: 'Burn methanol in a spirit burner under a copper calorimeter containing 100.0 cm\u00B3 of water. Measure the temperature rise to determine the enthalpy of combustion.',
    xAxis: { label: 'Time', unit: 's' },
    yAxis: { label: 'Temperature', unit: '\u00B0C' },
    defaults: { duration: 180, sampleRate: 2 },
    ibContext: {
      equation: '2CH\u2083OH(l) + 3O\u2082(g) \u2192 2CO\u2082(g) + 4H\u2082O(l)',
      expectedDeltaH: -726,
      formula: 'q = mc\u0394T, \u0394H = \u2212q/n(alcohol)'
    },
    generate: function(settings){
      var data = [];
      var dt = 1 / settings.sampleRate;
      var n = Math.round(settings.duration * settings.sampleRate);
      var T0 = 22.0 + (Math.random() - 0.5) * 2;
      var dT = 8.0 + Math.random() * 3.0;
      var lightTime = 10;
      var lightIdx = Math.round(lightTime * settings.sampleRate);
      for(var i = 0; i < n; i++){
        var t = i * dt;
        var T;
        if(i < lightIdx){
          T = T0 + (Math.random() - 0.5) * 0.3;
        } else {
          var elapsed = t - lightTime;

function getSettings(){
  var exp = EXPERIMENTS[_activeExperiment];
  if(exp.sensor === 'temperature'){
    return { duration: exp.defaults.duration, sampleRate: exp.defaults.sampleRate };
  } else {
    return { volumeIncrement: exp.defaults.volumeIncrement, totalVolume: exp.defaults.totalVolume };
  }

// ── Sensor Drawing Functions ──
function drawTemperatureProbe(ctx, cx, cy, s){
  s = s || 1; ctx.save();
  ctx.strokeStyle = '#64748B'; ctx.lineWidth = 1;
  ctx.fillStyle = '#94A3B8';
  ctx.fillRect(cx-6*s, cy-25*s, 12*s, 30*s);
  ctx.strokeRect(cx-6*s, cy-25*s, 12*s, 30*s);
  ctx.fillStyle = '#CBD5E1';
  ctx.fillRect(cx-2*s, cy+5*s, 4*s, 25*s);
  ctx.strokeRect(cx-2*s, cy+5*s, 4*s, 25*s);
  ctx.fillStyle = '#64748B';
  ctx.beginPath(); ctx.arc(cx, cy+32*s, 3*s, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#22C55E';
  ctx.beginPath(); ctx.arc(cx, cy-20*s, 2*s, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawpHProbe(ctx, cx, cy, s){
  s = s || 1; ctx.save();
  ctx.strokeStyle = '#64748B'; ctx.lineWidth = 1;
  ctx.fillStyle = '#475569';
  ctx.fillRect(cx-7*s, cy-28*s, 14*s, 20*s);
  ctx.strokeRect(cx-7*s, cy-28*s, 14*s, 20*s);
  ctx.fillStyle = 'rgba(226,232,240,0.6)';
  ctx.fillRect(cx-5*s, cy-8*s, 10*s, 30*s);
  ctx.strokeRect(cx-5*s, cy-8*s, 10*s, 30*s);
  ctx.fillStyle = '#94A3B8';
  ctx.fillRect(cx-5*s, cy+2*s, 10*s, 3*s);
  ctx.fillStyle = 'rgba(200,220,240,0.5)';
  ctx.beginPath(); ctx.arc(cx, cy+24*s, 5*s, 0, Math.PI); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#22C55E';
  ctx.beginPath(); ctx.arc(cx, cy-24*s, 2*s, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function addTableRow(d){
  var tbody = document.getElementById('dataBody');
  if(!tbody) return;
  var tr = document.createElement('tr');
  var td1 = document.createElement('td'); td1.textContent = d.x;
  var td2 = document.createElement('td'); td2.textContent = d.y;
  tr.appendChild(td1); tr.appendChild(td2); tbody.appendChild(tr);
  var wrap = tbody.closest('.data-table-wrap');
  if(wrap) wrap.scrollTop = wrap.scrollHeight;
}

function clearTable(){
  var tbody = document.getElementById('dataBody');
  if(tbody) clearChildren(tbody);
}

function updateCollectButtons(){
  var startBtn = document.getElementById('startBtn');
  var stopBtn = document.getElementById('stopBtn');
  var status = document.getElementById('collectStatus');
  if(startBtn) startBtn.disabled = _collecting;
  if(stopBtn) stopBtn.disabled = !_collecting;
  if(status){
    if(_collecting) status.textContent = 'Collecting... (' + _dataIndex + ' / ' + _generatedData.length + ' points)';
    else if(_collectedData.length > 0) status.textContent = 'Collection complete \u2014 ' + _collectedData.length + ' data points. Switch to Analysis tab.';
    else status.textContent = 'Ready \u2014 connect sensor and press Start';
  }
}

function startCollection(){
  if(!_sensorConnected){ showFeedback('Connect the sensor first on the Setup tab!', 'incorrect'); return; }
  var exp = EXPERIMENTS[_activeExperiment];
  _generatedData = exp.generate(_settings);
  _collectedData = [];
  _dataIndex = 0;
  clearTable();
  _collecting = true;
  updateCollectButtons();
  collectNext();
}

function collectNext(){
  if(!_collecting || _dataIndex >= _generatedData.length){
    _collecting = false;
    updateCollectButtons();
    return;
  }
  _collectedData.push(_generatedData[_dataIndex]);
  addTableRow(_generatedData[_dataIndex]);
  _dataIndex++;
  updateCollectButtons();
  renderCollectGraph();
  var exp = EXPERIMENTS[_activeExperiment];
  var delay = (exp.sensor === 'ph') ? 300 : (1000 / _settings.sampleRate);
  _collectionTimer = setTimeout(collectNext, delay / _speed);
}

function stopCollection(){
  _collecting = false;
  clearTimeout(_collectionTimer);
  updateCollectButtons();
}

function resetExperiment(){
  stopCollection();
  _collectedData = [];
  _dataIndex = 0;
  _generatedData = [];
  _annotations = [];
  clearTable();
  renderCollectGraph();
  updateCollectButtons();
}

function toggleCollection(){
  if(_collecting) stopCollection(); else startCollection();
}

// ── Render Collection Graph ──
function renderCollectGraph(){
  var canvas = document.getElementById('collectGraph');
  if(!canvas) return;
  var dpr = window.devicePixelRatio || 1;
  var w = parseInt(canvas.getAttribute('data-w'));
  var h = parseInt(canvas.getAttribute('data-h'));
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var pad = { top: 30, right: 30, bottom: 50, left: 65 };
  var pw = w - pad.left - pad.right;
  var ph = h - pad.top - pad.bottom;
  var exp = EXPERIMENTS[_activeExperiment];

  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, w, h);

  // Axis ranges
  var xMin = 0, xMax, yMin, yMax;
  if(EXPERIMENTS[_activeExperiment].sensor === 'ph'){
    xMax = _settings.totalVolume || 50; yMin = 0; yMax = 14;
  } else {
    xMax = _settings.duration || 180; yMin = 15; yMax = 35;
  }
  if(_collectedData.length > 0){
    var ys = _collectedData.map(function(d){ return d.y; });
    var dataMin = Math.min.apply(null, ys);
    var dataMax = Math.max.apply(null, ys);
    var margin = (dataMax - dataMin) * 0.1 || 1;
    yMin = Math.floor(dataMin - margin);
    yMax = Math.ceil(dataMax + margin);
  }

  // Grid
  ctx.strokeStyle = '#E2E8F0'; ctx.lineWidth = 0.5;
  var xTicks = 6, yTicks = 6;
  for(var i = 0; i <= xTicks; i++){
    var gx = pad.left + (i / xTicks) * pw;
    ctx.beginPath(); ctx.moveTo(gx, pad.top); ctx.lineTo(gx, pad.top + ph); ctx.stroke();
  }
  for(var j = 0; j <= yTicks; j++){
    var gy = pad.top + (j / yTicks) * ph;
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(pad.left + pw, gy); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = '#1E293B'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top + ph); ctx.lineTo(pad.left + pw, pad.top + ph); ctx.stroke();

  // Tick labels
  ctx.fillStyle = '#64748B'; ctx.font = '11px Fira Code, monospace'; ctx.textAlign = 'center';
  for(var i = 0; i <= xTicks; i++){
    var val = xMin + (i / xTicks) * (xMax - xMin);
    var gx = pad.left + (i / xTicks) * pw;
    ctx.fillText(Math.round(val * 10) / 10, gx, pad.top + ph + 18);
  }
  ctx.textAlign = 'right';
  for(var j = 0; j <= yTicks; j++){
    var val = yMax - (j / yTicks) * (yMax - yMin);
    var gy = pad.top + (j / yTicks) * ph;
    ctx.fillText(Math.round(val * 10) / 10, pad.left - 8, gy + 4);
  }

  // Data line + points
  if(_collectedData.length > 0){
    ctx.strokeStyle = '#0D9488'; ctx.lineWidth = 2;
    ctx.beginPath();
    _collectedData.forEach(function(d, i){
      var px = pad.left + ((d.x - xMin) / (xMax - xMin)) * pw;
      var py = pad.top + (1 - (d.y - yMin) / (yMax - yMin)) * ph;
      if(i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    });
    ctx.stroke();
    ctx.fillStyle = '#0D9488';
    _collectedData.forEach(function(d){
      var px = pad.left + ((d.x - xMin) / (xMax - xMin)) * pw;
      var py = pad.top + (1 - (d.y - yMin) / (yMax - yMin)) * ph;
      ctx.beginPath(); ctx.arc(px, py, 2.5, 0, Math.PI*2); ctx.fill();
    });
  }

  // Axis titles
  ctx.fillStyle = '#1E293B'; ctx.font = '600 12px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(exp.xAxis.label + (exp.xAxis.unit ? ' / ' + exp.xAxis.unit : ''), pad.left + pw/2, h - 8);
  ctx.save(); ctx.translate(14, pad.top + ph/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(exp.yAxis.label + (exp.yAxis.unit ? ' / ' + exp.yAxis.unit : ''), 0, 0);
  ctx.restore();
}

// ── Analysis Helpers ──
function linearRegression(pts){
  var n = pts.length; if(n < 2) return {m:0, b:0, r2:0};
  var sx=0,sy=0,sxx=0,sxy=0,syy=0;
  for(var i=0;i<n;i++){ sx+=pts[i].x; sy+=pts[i].y; sxx+=pts[i].x*pts[i].x; sxy+=pts[i].x*pts[i].y; syy+=pts[i].y*pts[i].y; }
  var denom = n*sxx - sx*sx; if(Math.abs(denom)<1e-12) return {m:0, b:sy/n, r2:0};
  var m = (n*sxy - sx*sy) / denom;
  var b = (sy - m*sx) / n;
  var ssRes=0, ssTot=0, yMean=sy/n;
  for(var i=0;i<n;i++){ var yhat=m*pts[i].x+b; ssRes+=(pts[i].y-yhat)*(pts[i].y-yhat); ssTot+=(pts[i].y-yMean)*(pts[i].y-yMean); }
  var r2 = ssTot>0 ? 1 - ssRes/ssTot : 0;
  return {m:m, b:b, r2:r2};
}

function quadraticRegression(pts){
  var n = pts.length; if(n < 3) return {a:0,b:0,c:0,r2:0};
  var sx=0,sx2=0,sx3=0,sx4=0,sy=0,sxy=0,sx2y=0;
  for(var i=0;i<n;i++){
    var x=pts[i].x, y=pts[i].y, x2=x*x;
    sx+=x; sx2+=x2; sx3+=x2*x; sx4+=x2*x2; sy+=y; sxy+=x*y; sx2y+=x2*y;
  }
  var M=[[n,sx,sx2],[sx,sx2,sx3],[sx2,sx3,sx4]];
  var V=[sy,sxy,sx2y];
  // Solve 3x3 using Cramer's rule
  function det3(m){return m[0][0]*(m[1][1]*m[2][2]-m[1][2]*m[2][1])-m[0][1]*(m[1][0]*m[2][2]-m[1][2]*m[2][0])+m[0][2]*(m[1][0]*m[2][1]-m[1][1]*m[2][0]);}
  var D=det3(M); if(Math.abs(D)<1e-12) return {a:0,b:0,c:0,r2:0};
  function rep(col,v){var r=M.map(function(row){return row.slice();}); for(var i=0;i<3;i++) r[i][col]=v[i]; return r;}
  var c=det3(rep(0,V))/D, b=det3(rep(1,V))/D, a=det3(rep(2,V))/D;
  var ssRes=0,ssTot=0,yMean=sy/n;
  for(var i=0;i<n;i++){var yhat=a*pts[i].x*pts[i].x+b*pts[i].x+c; ssRes+=(pts[i].y-yhat)*(pts[i].y-yhat); ssTot+=(pts[i].y-yMean)*(pts[i].y-yMean);}
  var r2=ssTot>0?1-ssRes/ssTot:0;
  return {a:a,b:b,c:c,r2:r2};
}

function exponentialRegression(pts){
  // Linearize: ln(y) = ln(A) + B*x => fit linear to (x, ln(y))
  var valid = pts.filter(function(p){return p.y > 0;});
  if(valid.length < 2) return {A:1,B:0,r2:0};
  var lnPts = valid.map(function(p){return {x:p.x, y:Math.log(p.y)};});
  var fit = linearRegression(lnPts);
  return {A:Math.exp(fit.b), B:fit.m, r2:fit.r2};
}

function calcStats(pts){
  if(!pts.length) return {};
  var ys = pts.map(function(p){return p.y;});
  var mean = ys.reduce(function(a,b){return a+b;},0) / ys.length;
  var min = Math.min.apply(null,ys), max = Math.max.apply(null,ys);
  var variance = ys.reduce(function(a,b){return a+(b-mean)*(b-mean);},0) / ys.length;
  return {mean:mean, min:min, max:max, stddev:Math.sqrt(variance), count:ys.length};
}

    appendLabeledLine(hlPanel, 'Systematic error', 'CO\u2082 loss from solution may slightly shift pH values; freshly prepared solutions recommended');
    appendLabeledLine(hlPanel, 'Random error', 'Clear equivalence points mean steepest-slope method works well; uncertainty in V(eq) is small');
  }

  container.appendChild(results);
  container.appendChild(ibPanel);
  container.appendChild(teacher3);
  container.appendChild(hlPanel);
  container.appendChild(copyBtn);
  renderAnalysisGraph();
}

function handleAnalysisClick(mx, my){
  var canvas = document.getElementById('analysisGraph');
  var w = parseInt(canvas.getAttribute('data-w'));
  var h = parseInt(canvas.getAttribute('data-h'));
  var pad = {top:30, right:30, bottom:50, left:65};
  var pw = w - pad.left - pad.right;
  var ph = h - pad.top - pad.bottom;
  var ranges = getAnalysisRanges();

  // Convert pixel to data coords
  var dataX = ranges.xMin + ((mx - pad.left) / pw) * (ranges.xMax - ranges.xMin);
  var dataY = ranges.yMax - ((my - pad.top) / ph) * (ranges.yMax - ranges.yMin);

  // Find nearest data point
  var nearest = null, nearDist = Infinity;
  _collectedData.forEach(function(d){
    var dx = d.x - dataX, dy = d.y - dataY;
    var normDx = dx / (ranges.xMax - ranges.xMin);
    var normDy = dy / (ranges.yMax - ranges.yMin);
    var dist = normDx*normDx + normDy*normDy;
    if(dist < nearDist){ nearDist = dist; nearest = d; }
  });

  if(_activeTool === 'statistics' || _activeTool === 'linearfit'){
    _selectionPoints.push(nearest);
    if(_selectionPoints.length >= 2){
      updateResults();
      renderAnalysisGraph();
    } else {
      renderAnalysisGraph();
    }
  } else if(_activeTool === 'curvefit'){
    updateResults();
    renderAnalysisGraph();
  } else if(_activeTool === 'tangent'){
    _selectionPoints = [nearest];
    updateResults();
    renderAnalysisGraph();
  } else if(_activeTool === 'annotation'){
    var text = prompt('Enter annotation text:');
    if(text){
      _annotations.push({x: nearest.x, y: nearest.y, text: text});
      renderAnalysisGraph();
    }
  }
}

function getAnalysisRanges(){
  var exp = EXPERIMENTS[_activeExperiment];
  var xMin = 0, xMax, yMin, yMax;
  if(EXPERIMENTS[_activeExperiment].sensor === 'ph'){
    xMax = _settings.totalVolume || 50; yMin = 0; yMax = 14;
  } else {
    xMax = _settings.duration || 180; yMin = 15; yMax = 35;
  }
  if(_collectedData.length > 0){
    var ys = _collectedData.map(function(d){return d.y;});
    var dataMin = Math.min.apply(null,ys), dataMax = Math.max.apply(null,ys);
    var margin = (dataMax - dataMin) * 0.1 || 1;
    yMin = Math.floor(dataMin - margin); yMax = Math.ceil(dataMax + margin);
  }
  return {xMin:xMin, xMax:xMax, yMin:yMin, yMax:yMax};
}

    else slope = (_collectedData[idx+1].y - _collectedData[idx-1].y) / (_collectedData[idx+1].x - _collectedData[idx-1].x);

function updateIBContext(){
  var ibPanel = document.getElementById('ibContextPanel');
  if(!ibPanel) return;
  clearChildren(ibPanel);
  var exp = EXPERIMENTS[_activeExperiment];

  if(_collectedData.length === 0){ ibPanel.style.display = 'none'; return; }
  ibPanel.style.display = 'block';
  var title = document.createElement('h4'); title.textContent = 'IB Context: ' + exp.name;
  ibPanel.appendChild(title);

  if(_activeExperiment === 'neutralization'){
    var ys = _collectedData.map(function(d){return d.y;});
    var T0 = ys[0], Tmax = Math.max.apply(null, ys);
    var deltaT = Tmax - T0;
    var mass = 0.050; // 50 cm3 = 50 g approx
    var c = 4.18;
    var q = mass * c * deltaT * 1000; // in J
    var moles = 0.025; // 25cm3 of 1 mol/dm3
    var deltaH = -q / moles / 1000; // kJ/mol
    var items = [
      ['Equation', exp.ibContext.equation],
      ['\u0394T', deltaT.toFixed(2) + ' \u00B0C'],
      ['q = mc\u0394T', (q).toFixed(1) + ' J'],
      ['\u0394H = \u2212q/n', deltaH.toFixed(1) + ' kJ mol\u207B\u00B9'],
      ['Expected \u0394H', exp.ibContext.expectedDeltaH + ' kJ mol\u207B\u00B9']
    ];
    items.forEach(function(item){
      var row = document.createElement('div'); row.className = 'result-row';
      var lbl = document.createElement('span'); lbl.className = 'result-label'; lbl.textContent = item[0];
      var val = document.createElement('span'); val.className = 'result-value'; val.textContent = item[1];
      row.appendChild(lbl); row.appendChild(val); ibPanel.appendChild(row);
    });
  } else if(_activeExperiment === 'titration'){
    // Strong acid-base titration: find equivalence point (steepest slope)
    var maxSlope = 0, eqIdx = 0;
    for(var i = 1; i < _collectedData.length; i++){
      var slope = Math.abs((_collectedData[i].y - _collectedData[i-1].y) / (_collectedData[i].x - _collectedData[i-1].x));
      if(slope > maxSlope){ maxSlope = slope; eqIdx = i; }
    }
    var eqVol = _collectedData[eqIdx] ? _collectedData[eqIdx].x : 25;
    var cBase = 0.100, vAcid = 25.0;
    var cAcid = (cBase * eqVol) / vAcid;
    var items = [
      ['Equation', exp.ibContext.equation],
      ['Equivalence Volume', eqVol.toFixed(1) + ' cm\u00B3'],
      ['Equivalence pH', _collectedData[eqIdx] ? _collectedData[eqIdx].y.toFixed(2) : '7.00'],
      ['c(HCl) = c(NaOH)\u00D7V(NaOH)/V(HCl)', cAcid.toFixed(4) + ' mol dm\u207B\u00B3'],
      ['Expected Equiv. Vol', exp.ibContext.expectedEquivVol + ' cm\u00B3']
    ];
    items.forEach(function(item){
      var row = document.createElement('div'); row.className = 'result-row';
      var lbl = document.createElement('span'); lbl.className = 'result-label'; lbl.textContent = item[0];
      var val = document.createElement('span'); val.className = 'result-value'; val.textContent = item[1];
      row.appendChild(lbl); row.appendChild(val); ibPanel.appendChild(row);
    });
  } else if(_activeExperiment === 'combustion'){
    // Combustion: extract T0 and Tmax, calculate q=mcDT, DH=-q/n
    var ys = _collectedData.map(function(d){return d.y;});
    var T0 = ys[0], Tmax = Math.max.apply(null, ys);
    var deltaT = Tmax - T0;
    var mass = 0.100; // 100 cm3 water
    var c = 4.18;
    var q = mass * c * deltaT * 1000; // in J
    var molarMass = 32.04; // CH3OH
    var massFuel = 5.0; // grams
    var moles = massFuel / molarMass;
    var deltaH = -q / moles / 1000; // kJ/mol
    var pctDiff = Math.abs((deltaH - exp.ibContext.expectedDeltaH) / Math.abs(exp.ibContext.expectedDeltaH) * 100);
    var items = [
      ['Equation', exp.ibContext.equation],
      ['\u0394T', deltaT.toFixed(2) + ' \u00B0C'],
      ['q = mc\u0394T', q.toFixed(1) + ' J'],
      ['n(CH\u2083OH) = 5.0 / 32.04', moles.toFixed(4) + ' mol'],
      ['\u0394H = \u2212q/n', deltaH.toFixed(1) + ' kJ mol\u207B\u00B9'],
      ['Expected \u0394H', exp.ibContext.expectedDeltaH + ' kJ mol\u207B\u00B9'],
      ['% difference', pctDiff.toFixed(1) + '%']
    ];
    items.forEach(function(item){
      var row = document.createElement('div'); row.className = 'result-row';
      var lbl = document.createElement('span'); lbl.className = 'result-label'; lbl.textContent = item[0];
      var val = document.createElement('span'); val.className = 'result-value'; val.textContent = item[1];
      row.appendChild(lbl); row.appendChild(val); ibPanel.appendChild(row);
    });
  } else if(_activeExperiment === 'dissolution'){
    // Dissolution: extract T0 and Tmin (endothermic — temperature drops)
    var ys = _collectedData.map(function(d){return d.y;});
    var T0 = ys[0], Tmin = Math.min.apply(null, ys);
    var deltaT = Tmin - T0; // negative
    var mass = 0.050; // 50 cm3 water
    var c = 4.18;
    var q = mass * c * deltaT * 1000; // in J (negative)
    var molarMass = 80.04; // NH4NO3
    var massSolute = 5.00; // grams
    var moles = massSolute / molarMass;
    var deltaH = -q / moles / 1000; // kJ/mol (positive for endothermic)
    var items = [
      ['Equation', exp.ibContext.equation],
      ['\u0394T', deltaT.toFixed(2) + ' \u00B0C (negative \u2014 endothermic)'],
      ['q = mc\u0394T', q.toFixed(1) + ' J (negative)'],
      ['n(NH\u2084NO\u2083) = 5.00 / 80.04', moles.toFixed(4) + ' mol'],
      ['\u0394H = \u2212q/n', '+' + deltaH.toFixed(1) + ' kJ mol\u207B\u00B9 (positive \u2014 endothermic)'],
      ['Expected \u0394H', '+' + exp.ibContext.expectedDeltaH + ' kJ mol\u207B\u00B9'],
      ['Sign convention', '\u0394T < 0 \u2192 q < 0 \u2192 \u0394H = \u2212q/n > 0 (endothermic)']
    ];
    items.forEach(function(item){
      var row = document.createElement('div'); row.className = 'result-row';
      var lbl = document.createElement('span'); lbl.className = 'result-label'; lbl.textContent = item[0];
      var val = document.createElement('span'); val.className = 'result-value'; val.textContent = item[1];
      row.appendChild(lbl); row.appendChild(val); ibPanel.appendChild(row);
    });
  } else if(_activeExperiment === 'weakAcidTitration' || _activeExperiment === 'methanoicTitration'){
    // Weak acid titration: find equivalence point, half-equivalence, pKa
    var maxSlope = 0, eqIdx = 0;
    for(var i = 1; i < _collectedData.length; i++){
      var slope = Math.abs((_collectedData[i].y - _collectedData[i-1].y) / (_collectedData[i].x - _collectedData[i-1].x));
      if(slope > maxSlope){ maxSlope = slope; eqIdx = i; }
    }
    var eqVol = _collectedData[eqIdx] ? _collectedData[eqIdx].x : 25;
    var eqPH = _collectedData[eqIdx] ? _collectedData[eqIdx].y : exp.ibContext.expectedEquivPH;
    var halfEqVol = eqVol / 2;
    // Find pH at half-equivalence (nearest data point)
    var halfIdx = 0, halfDist = Infinity;
    for(var i = 0; i < _collectedData.length; i++){
      var dist = Math.abs(_collectedData[i].x - halfEqVol);
      if(dist < halfDist){ halfDist = dist; halfIdx = i; }
    }
    var halfEqPH = _collectedData[halfIdx] ? _collectedData[halfIdx].y : 0;
    var expectedPKa = -Math.log10(exp.ibContext.Ka);
    var items = [
      ['Equation', exp.ibContext.equation],
      ['Equivalence Volume', eqVol.toFixed(1) + ' cm\u00B3'],
      ['Equivalence pH', eqPH.toFixed(2)],
      ['Half-equivalence Volume', halfEqVol.toFixed(1) + ' cm\u00B3'],
      ['pH at half-equivalence (\u2248 pKa)', halfEqPH.toFixed(2)],
      ['Expected pKa (\u2212log Ka)', expectedPKa.toFixed(2)],
      ['Expected Equiv. pH', exp.ibContext.expectedEquivPH.toFixed(1)],
      ['Formula', exp.ibContext.formula]
    ];
    items.forEach(function(item){
      var row = document.createElement('div'); row.className = 'result-row';
      var lbl = document.createElement('span'); lbl.className = 'result-label'; lbl.textContent = item[0];
      var val = document.createElement('span'); val.className = 'result-value'; val.textContent = item[1];
      row.appendChild(lbl); row.appendChild(val); ibPanel.appendChild(row);
    });
  } else if(_activeExperiment === 'diproticH2SO4' || _activeExperiment === 'diproticH2CO3'){
    // Diprotic titration: find TWO equivalence points
    // First pass: find the steepest slope overall
    var maxSlope1 = 0, eq1Idx = 0;
    for(var i = 1; i < _collectedData.length; i++){
      var slope = Math.abs((_collectedData[i].y - _collectedData[i-1].y) / (_collectedData[i].x - _collectedData[i-1].x));
      if(slope > maxSlope1){ maxSlope1 = slope; eq1Idx = i; }
    }
    // Second pass: find steepest slope in the other half
    var midX = _collectedData[eq1Idx] ? _collectedData[eq1Idx].x : 25;
    var maxSlope2 = 0, eq2Idx = 0;
    // Determine which half to search: if eq1 is in first half, search second half, and vice versa
    var totalX = _collectedData[_collectedData.length - 1].x;
    var searchFirst = (midX > totalX * 0.4); // steepest was in second half, search first
    for(var i = 1; i < _collectedData.length; i++){
      var inRange = searchFirst ? (_collectedData[i].x < midX * 0.7) : (_collectedData[i].x > midX * 1.3);
      if(!inRange) continue;
      var slope = Math.abs((_collectedData[i].y - _collectedData[i-1].y) / (_collectedData[i].x - _collectedData[i-1].x));
      if(slope > maxSlope2){ maxSlope2 = slope; eq2Idx = i; }
    }
    // Ensure eq1 < eq2 by volume
    var firstIdx = (eq1Idx < eq2Idx) ? eq1Idx : eq2Idx;
    var secondIdx = (eq1Idx < eq2Idx) ? eq2Idx : eq1Idx;
    var eq1Vol = _collectedData[firstIdx] ? _collectedData[firstIdx].x : exp.ibContext.expectedEquivVol1;
    var eq1PH = _collectedData[firstIdx] ? _collectedData[firstIdx].y : 0;
    var eq2Vol = _collectedData[secondIdx] ? _collectedData[secondIdx].x : exp.ibContext.expectedEquivVol2;
    var eq2PH = _collectedData[secondIdx] ? _collectedData[secondIdx].y : 0;
    var items = [
      ['Equation', exp.ibContext.equation],
      ['1st Equivalence Volume', eq1Vol.toFixed(1) + ' cm\u00B3'],
      ['1st Equivalence pH', eq1PH.toFixed(2)],
      ['2nd Equivalence Volume', eq2Vol.toFixed(1) + ' cm\u00B3'],
      ['2nd Equivalence pH', eq2PH.toFixed(2)],
      ['Expected 1st Equiv. Vol', exp.ibContext.expectedEquivVol1 + ' cm\u00B3'],
      ['Expected 2nd Equiv. Vol', exp.ibContext.expectedEquivVol2 + ' cm\u00B3'],
      ['Formula', exp.ibContext.formula]
    ];
    if(_activeExperiment === 'diproticH2SO4'){
      items.push(['Note', 'First equivalence poorly separated \u2014 Ka2 = 0.012 is too large for a distinct step']);
    }
    items.forEach(function(item){
      var row = document.createElement('div'); row.className = 'result-row';
      var lbl = document.createElement('span'); lbl.className = 'result-label'; lbl.textContent = item[0];
      var val = document.createElement('span'); val.className = 'result-value'; val.textContent = item[1];
      row.appendChild(lbl); row.appendChild(val); ibPanel.appendChild(row);
    });
  }
}

// ── Render Analysis Graph ──
function renderAnalysisGraph(){
  var canvas = document.getElementById('analysisGraph');
  if(!canvas) return;
  var dpr = window.devicePixelRatio || 1;
  var w = parseInt(canvas.getAttribute('data-w'));
  var h = parseInt(canvas.getAttribute('data-h'));
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  var ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  var pad = {top:30, right:30, bottom:50, left:65};
  var pw = w - pad.left - pad.right;
  var ph = h - pad.top - pad.bottom;
  var ranges = getAnalysisRanges();
  var exp = EXPERIMENTS[_activeExperiment];

  ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = '#E2E8F0'; ctx.lineWidth = 0.5;
  var xTicks = 6, yTicks = 6;
  for(var i = 0; i <= xTicks; i++){
    var gx = pad.left + (i / xTicks) * pw;
    ctx.beginPath(); ctx.moveTo(gx, pad.top); ctx.lineTo(gx, pad.top + ph); ctx.stroke();
  }
  for(var j = 0; j <= yTicks; j++){
    var gy = pad.top + (j / yTicks) * ph;
    ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(pad.left + pw, gy); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = '#1E293B'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top + ph); ctx.lineTo(pad.left + pw, pad.top + ph); ctx.stroke();

  // Tick labels
  ctx.fillStyle = '#64748B'; ctx.font = '11px Fira Code, monospace'; ctx.textAlign = 'center';
  for(var i = 0; i <= xTicks; i++){
    var val = ranges.xMin + (i / xTicks) * (ranges.xMax - ranges.xMin);
    ctx.fillText(Math.round(val * 10) / 10, pad.left + (i / xTicks) * pw, pad.top + ph + 18);
  }
  ctx.textAlign = 'right';
  for(var j = 0; j <= yTicks; j++){
    var val = ranges.yMax - (j / yTicks) * (ranges.yMax - ranges.yMin);
    ctx.fillText(Math.round(val * 10) / 10, pad.left - 8, pad.top + (j / yTicks) * ph + 4);
  }

  function toPixelX(x){ return pad.left + ((x - ranges.xMin) / (ranges.xMax - ranges.xMin)) * pw; }
  function toPixelY(y){ return pad.top + (1 - (y - ranges.yMin) / (ranges.yMax - ranges.yMin)) * ph; }

  // Data line + points
  if(_collectedData.length > 0){
    ctx.strokeStyle = '#0D9488'; ctx.lineWidth = 2;
    ctx.beginPath();
    _collectedData.forEach(function(d, i){
      var px = toPixelX(d.x), py = toPixelY(d.y);
      if(i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    });
    ctx.stroke();
    ctx.fillStyle = '#0D9488';
    _collectedData.forEach(function(d){
      ctx.beginPath(); ctx.arc(toPixelX(d.x), toPixelY(d.y), 3, 0, Math.PI*2); ctx.fill();
    });
  }

  // Selection highlights
  if(_selectionPoints.length > 0 && (_activeTool === 'statistics' || _activeTool === 'linearfit')){
    _selectionPoints.forEach(function(sp){
      ctx.fillStyle = '#DC2626';
      ctx.beginPath(); ctx.arc(toPixelX(sp.x), toPixelY(sp.y), 5, 0, Math.PI*2); ctx.fill();
    });
    if(_selectionPoints.length >= 2){
      var x1 = Math.min(_selectionPoints[0].x, _selectionPoints[1].x);
      var x2 = Math.max(_selectionPoints[0].x, _selectionPoints[1].x);
      ctx.fillStyle = 'rgba(13,148,136,0.1)';
      ctx.fillRect(toPixelX(x1), pad.top, toPixelX(x2) - toPixelX(x1), ph);
    }
  }

  // Linear fit line
  if(_activeTool === 'linearfit' && _selectionPoints.length >= 2){
    var x1 = Math.min(_selectionPoints[0].x, _selectionPoints[1].x);
    var x2 = Math.max(_selectionPoints[0].x, _selectionPoints[1].x);
    var subset = _collectedData.filter(function(d){ return d.x >= x1 && d.x <= x2; });
    var fit = linearRegression(subset);
    ctx.strokeStyle = '#DC2626'; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(toPixelX(x1), toPixelY(fit.m * x1 + fit.b)); ctx.lineTo(toPixelX(x2), toPixelY(fit.m * x2 + fit.b)); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Curve fit
  if(_activeTool === 'curvefit' && _collectedData.length > 0){
    var fitType = (document.getElementById('fitType') || {}).value || 'linear';
    ctx.strokeStyle = '#7C3AED'; ctx.lineWidth = 2; ctx.setLineDash([6,4]);
    ctx.beginPath();
    var step = (ranges.xMax - ranges.xMin) / 200;
    for(var x = ranges.xMin; x <= ranges.xMax; x += step){
      var y;
      if(fitType === 'linear'){ var f = linearRegression(_collectedData); y = f.m*x + f.b; }
      else if(fitType === 'quadratic'){ var f = quadraticRegression(_collectedData); y = f.a*x*x + f.b*x + f.c; }
      else { var f = exponentialRegression(_collectedData); y = f.A * Math.exp(f.B * x); }
      var px = toPixelX(x), py = toPixelY(y);
      if(x === ranges.xMin) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke(); ctx.setLineDash([]);
  }

  // Tangent line
  if(_activeTool === 'tangent' && _selectionPoints.length >= 1){
    var pt = _selectionPoints[0];
    var idx = -1;
    for(var i = 0; i < _collectedData.length; i++){ if(_collectedData[i].x === pt.x){ idx = i; break; } }
    var slope;
    if(idx <= 0) slope = (_collectedData[1].y - _collectedData[0].y) / (_collectedData[1].x - _collectedData[0].x);
    else if(idx >= _collectedData.length - 1){ var n = _collectedData.length; slope = (_collectedData[n-1].y - _collectedData[n-2].y) / (_collectedData[n-1].x - _collectedData[n-2].x); }
    else slope = (_collectedData[idx+1].y - _collectedData[idx-1].y) / (_collectedData[idx+1].x - _collectedData[idx-1].x);
    var tangentLen = (ranges.xMax - ranges.xMin) * 0.15;
    ctx.strokeStyle = '#D97706'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(toPixelX(pt.x - tangentLen), toPixelY(pt.y - slope * tangentLen));
    ctx.lineTo(toPixelX(pt.x + tangentLen), toPixelY(pt.y + slope * tangentLen));
    ctx.stroke();
    ctx.fillStyle = '#D97706';
    ctx.beginPath(); ctx.arc(toPixelX(pt.x), toPixelY(pt.y), 5, 0, Math.PI*2); ctx.fill();
  }

  // Annotations
  _annotations.forEach(function(a){
    ctx.fillStyle = '#1E293B'; ctx.font = '600 11px Inter, sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(a.text, toPixelX(a.x) + 6, toPixelY(a.y) - 6);
    ctx.fillStyle = '#7C3AED';
    ctx.beginPath(); ctx.arc(toPixelX(a.x), toPixelY(a.y), 4, 0, Math.PI*2); ctx.fill();
  });

  // Axis titles
  ctx.fillStyle = '#1E293B'; ctx.font = '600 12px Inter, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(exp.xAxis.label + (exp.xAxis.unit ? ' / ' + exp.xAxis.unit : ''), pad.left + pw/2, h - 8);
  ctx.save(); ctx.translate(14, pad.top + ph/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(exp.yAxis.label + (exp.yAxis.unit ? ' / ' + exp.yAxis.unit : ''), 0, 0);
  ctx.restore();
}

function copyData(){
  var exp = EXPERIMENTS[_activeExperiment];
  var header = exp.xAxis.label + (exp.xAxis.unit ? ' (' + exp.xAxis.unit + ')' : '') + '\t' + exp.yAxis.label + (exp.yAxis.unit ? ' (' + exp.yAxis.unit + ')' : '') + '\n';
  var rows = _collectedData.map(function(d){ return d.x + '\t' + d.y; }).join('\n');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(header + rows).then(function(){
      showFeedback('Data copied to clipboard!', 'correct');
    });
  } else {
    showFeedback('Clipboard not available (try HTTPS or localhost).', 'incorrect');
  }
}

// ── Initialize Tabs ──
buildSetupTab();
buildCollectTab();

// Tab switching
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    var target = btn.getAttribute('data-tab');
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
    document.querySelectorAll('.tab-content').forEach(function(c){ c.classList.remove('active'); });
    btn.classList.add('active'); btn.setAttribute('aria-selected','true');
    document.getElementById('tab-'+target).classList.add('active');
    if(target === 'analysis') buildAnalysisTab();
    if(target === 'collect') buildCollectTab();
  });
});

// HL / Teacher toggles
document.getElementById('hlToggle').addEventListener('change', function(){ document.body.classList.toggle('hl-active', this.checked); });
document.getElementById('teacherToggle').addEventListener('change', function(){ document.body.classList.toggle('teacher-active', this.checked); });

// Keyboard shortcuts
document.addEventListener('keydown', function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
  var k = e.key.toLowerCase();
  if(k==='h') document.getElementById('hlToggle').click();
  if(k==='t') document.getElementById('teacherToggle').click();
  if(k==='1'||k==='2'||k==='3') document.querySelectorAll('.tab-btn')[parseInt(k)-1].click();
  if(k==='r') resetExperiment();
  if(k===' '){ e.preventDefault(); toggleCollection(); }
});

// resetExperiment and toggleCollection are defined above

})();
</script>
